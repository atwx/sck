---
Name: autotranslate
After:
  - '#sckfluent'
Only:
  moduleexists: 'wernerkrauss/silverstripe-fluent-export-import'
---

SilverStripe\CMS\Model\SiteTree:
  extensions:
    autotranslate: Netwerkstatt\FluentExIm\Extension\AutoTranslate
  translate_ignore:
    - URLSegment

SilverStripe\LinkField\Models\Link:
  extensions:
    - Netwerkstatt\FluentExIm\Extension\AutoTranslate
  field_exclude:
    - OwnerRelation
    - OwnerClass
    - Owner

DNADesign\Elemental\Models\BaseElement:
  extensions:
    - Netwerkstatt\FluentExIm\Extension\AutoTranslate
  translate:
    - Title
    - IsAutoTranslated
    - LastTranslation

Atwx\Sck\Tags\TaggableDataObject:
  extensions:
    - Netwerkstatt\FluentExIm\Extension\AutoTranslate
  field_include:
    - IsAutoTranslated
    - LastTranslation

